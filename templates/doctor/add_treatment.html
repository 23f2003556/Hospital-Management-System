{% extends 'base.html' %}
{% block title %}Add Treatment{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>Add Treatment for Appointment #{{ appointment.id }}</h2>
  <p>Patient: {{ appointment.patient.user.first_name }} {{ appointment.patient.user.last_name }}</p>
  <form method="post">
    
    <div class="mb-3">
      <label class="form-label">Diagnosis</label>
      <textarea name="diagnosis" class="form-control" rows="3">{{ appointment.treatment.diagnosis if appointment.treatment }}</textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Prescription</label>
      <textarea name="prescription" class="form-control" rows="2">{{ appointment.treatment.prescription if appointment.treatment }}</textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Medicines</label>
      <textarea name="medicines" class="form-control" rows="2">{{ appointment.treatment.medicines if appointment.treatment }}</textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Notes</label>
      <textarea name="notes" class="form-control" rows="2">{{ appointment.treatment.notes if appointment.treatment }}</textarea>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" name="follow_up_required" class="form-check-input" id="followUp" {% if appointment.treatment and appointment.treatment.follow_up_required %}checked{% endif %}>
      <label class="form-check-label" for="followUp">Follow-up required</label>
    </div>
    <div class="mb-3">
      <label class="form-label">Follow-up Date</label>
      <input type="date" name="follow_up_date" class="form-control" value="{{ appointment.treatment.follow_up_date if appointment.treatment and appointment.treatment.follow_up_date }}">
    </div>
    <button class="btn btn-primary">Save Treatment</button>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.querySelector('form').addEventListener('submit', function(e){
  const diag = this.querySelector('textarea[name="diagnosis"]').value.trim();
  if (!diag || diag.length < 5){ e.preventDefault(); alert('Diagnosis is required (min 5 chars).'); }
});
</script>
{% endblock %}
