{% extends "base.html" %}
{% block title %}Register - hospital+{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center my-5">
  <div class="col-md-7 col-lg-5">
    <div class="card shadow-lg border-0 rounded-lg">
      <div class="card-header justify-content-center bg-white border-0 mt-4">
        <h3 class="text-center font-weight-light my-2 text-primary">Create Account</h3>
      </div>
      <div class="card-body px-5 pb-5">
        <form method="POST" novalidate id="registerForm">
          {{ form.hidden_tag() }}

          <div class="row mb-3">
            <div class="col-md-6">
              <div class="form-floating mb-3 mb-md-0">
                <input type="text" name="first_name" class="form-control" id="inputFirstName" placeholder="First Name"
                  required value="{{ form.first_name.data or '' }}">
                <label for="inputFirstName">First name</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating">
                <input type="text" name="last_name" class="form-control" id="inputLastName" placeholder="Last Name"
                  required value="{{ form.last_name.data or '' }}">
                <label for="inputLastName">Last name</label>
              </div>
            </div>
          </div>

          <div class="form-floating mb-3">
            <input type="email" name="email" class="form-control" id="inputEmail" placeholder="name@example.com"
              required value="{{ form.email.data or '' }}">
            <label for="inputEmail">Email address</label>
          </div>

          <div class="form-floating mb-3">
            <input type="tel" name="phone" class="form-control" id="inputPhone" placeholder="Phone Number" required
              pattern="[0-9]+" value="{{ form.phone.data or '' }}">
            <label for="inputPhone">Phone number</label>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <div class="form-floating mb-3 mb-md-0">
                <input type="password" name="password" class="form-control" id="inputPassword"
                  placeholder="Create a password" required minlength="6">
                <label for="inputPassword">Password</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-floating mb-3 mb-md-0">
                <input type="password" name="confirm_password" class="form-control" id="inputPasswordConfirm"
                  placeholder="Confirm password" required minlength="6">
                <label for="inputPasswordConfirm">Confirm Password</label>
              </div>
            </div>
          </div>

          <div class="d-grid mt-4 mb-0">
            {{ form.submit(class="btn btn-primary btn-lg") }}
          </div>
        </form>
      </div>
      <div class="card-footer text-center py-3 border-0 bg-light rounded-bottom">
        <div class="small"><a href="{{ url_for('login') }}" class="text-decoration-none">Have an account? Go to
            login</a></div>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById("registerForm").addEventListener("submit", function (event) {
    const password = document.getElementById("inputPassword").value;
    const confirm = document.getElementById("inputPasswordConfirm").value;

    if (password !== confirm) {
      event.preventDefault();
      alert("Passwords do not match. Please check again.");
    }
  });
</script>
{% endblock %}
