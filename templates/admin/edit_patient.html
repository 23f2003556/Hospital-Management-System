{% extends 'base.html' %}
{% block title %}Edit Patient{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>Edit Patient - {{ user.first_name }} {{ user.last_name }}</h2>
  <form method="post">
    
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">First Name</label>
        <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Last Name</label>
        <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone</label>
      <input type="text" name="phone" class="form-control" value="{{ user.phone }}">
    </div>

    <div class="mb-3">
      <label class="form-label">Address</label>
      <textarea name="address" class="form-control">{{ user.address }}</textarea>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label class="form-label">Date of Birth</label>
        <input type="date" name="date_of_birth" class="form-control" value="{{ patient.date_of_birth }}">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Gender</label>
        <input type="text" name="gender" class="form-control" value="{{ patient.gender }}">
      </div>
      <div class="col-md-4 mb-3">
        <label class="form-label">Blood Group</label>
        <input type="text" name="blood_group" class="form-control" value="{{ patient.blood_group }}">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Allergies</label>
      <textarea name="allergies" class="form-control">{{ patient.allergies }}</textarea>
    </div>

    <div class="mb-3">
      <label class="form-label">Medical History</label>
      <textarea name="medical_history" class="form-control">{{ patient.medical_history }}</textarea>
    </div>

    <button class="btn btn-primary">Save Changes</button>
  </form>
</div>
{% endblock %}
